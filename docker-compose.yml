services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - openclaw

  openclaw:
    image: openclaw/openclaw:latest
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./openclaw/config:/app/config:ro
      - ./openclaw/skills:/app/skills:ro
      - openclaw_data:/app/data
      - openclaw_workspace:/app/workspace
    env_file:
      - .env

  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    restart: unless-stopped
    environment:
      - SUBDOMAINS=${DUCKDNS_SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}
      - UPDATE_IP=ipv4
      - LOG_FILE=false
      - TZ=America/New_York

volumes:
  caddy_data:
  caddy_config:
  openclaw_data:
  openclaw_workspace:
